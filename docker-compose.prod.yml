# Production stack: single API+SPA container behind a managed Postgres.
#
# Usage:
#   cp .env.prod.example .env.prod   # then edit with real secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Open http://localhost (or whatever you set PORT to) for both the API and
# the SPA — the container serves /api/* via Express and everything else from
# the built dist/ folder.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storeapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-storeapp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storeapp} -d ${POSTGRES_DB:-storeapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-storeapp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-storeapp}?schema=public
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
    ports:
      - "${APP_PORT:-80}:4000"

volumes:
  pgdata:
